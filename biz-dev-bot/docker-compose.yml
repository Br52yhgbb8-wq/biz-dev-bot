version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bizdev
      POSTGRES_PASSWORD: bizdev
      POSTGRES_DB: bizdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizdev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Biz Dev Bot"
      DEBUG: "false"
      DATABASE_URL: "postgresql+asyncpg://bizdev:bizdev@db:5432/bizdev"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - gmail_creds:/app/gmail_credentials.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "production"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  gmail_creds:
